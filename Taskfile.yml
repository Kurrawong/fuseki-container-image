# https://taskfile.dev

version: "3"

tasks:
  default:
    cmd: task -a

  fuseki:build:
    cmd: docker compose --profile fuseki build

  fuseki:up:
    cmd: docker compose --profile fuseki up -d

  fuseki:restart:
    cmd: docker compose --profile fuseki restart fuseki

  fuseki:down:
    cmd: docker compose --profile fuseki down

  fuseki:clean:
    cmd: docker compose --profile fuseki down -v

  fuseki:smoke:run:
    cmd: ./scripts/fuseki-smoke-test.sh

  fuseki:smoke:
    cmds:
      - docker compose --profile fuseki down -v || true
      - docker compose --profile fuseki build
      - docker compose --profile fuseki up -d
      - defer: docker compose --profile fuseki down -v
      - task fuseki:smoke:run
